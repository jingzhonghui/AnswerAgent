<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnswerAgent 前端交互原型</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --panel-soft: #f1f1ef;
      --text: #181818;
      --muted: #767676;
      --border: #dededb;
      --border-strong: #c9c9c4;
      --accent: #111111;
      --accent-muted: #eeeeeb;
      --danger: #b3261e;
      --shadow: 0 18px 50px rgba(0, 0, 0, .06);
      --sidebar: 300px;
    }

    [data-theme="dark"] {
      --bg: #101010;
      --panel: #171717;
      --panel-soft: #202020;
      --text: #f1f1ef;
      --muted: #9a9a94;
      --border: #2d2d2d;
      --border-strong: #3a3a3a;
      --accent: #f1f1ef;
      --accent-muted: #252525;
      --danger: #ff8a80;
      --shadow: 0 18px 50px rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    button, textarea { font: inherit; }
    button { border: 0; color: inherit; background: transparent; cursor: pointer; }

    .app-shell {
      width: min(1320px, calc(100vw - 32px));
      height: min(860px, calc(100vh - 32px));
      min-height: 680px;
      margin: 16px auto;
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
      background: var(--panel-soft);
    }

    .brand {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .brand-subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .theme-toggle {
      width: 42px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      background: var(--panel);
    }

    .theme-toggle:hover { color: var(--text); border-color: var(--border-strong); }

    .sidebar-actions { padding: 16px; }

    .new-chat {
      width: 100%;
      height: 42px;
      border-radius: 12px;
      color: var(--panel);
      background: var(--accent);
      font-weight: 700;
    }

    [data-theme="dark"] .new-chat { color: #101010; }

    .new-chat:active { transform: translateY(1px); }

    .sidebar-hint {
      padding: 0 18px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 16px;
    }

    .conversation-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 12px;
      margin: 4px 0;
      border: 1px solid transparent;
      border-radius: 12px;
      color: var(--muted);
    }

    .conversation-item:hover { background: var(--panel); }

    .conversation-item.active {
      color: var(--text);
      background: var(--panel);
      border-color: var(--border);
    }

    .conversation-main { min-width: 0; }
    .conversation-title { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 14px; font-weight: 700; }
    .conversation-meta { margin-top: 5px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: var(--muted); font-size: 12px; }
    .conversation-actions { display: flex; gap: 2px; opacity: .68; }
    .conversation-action { width: 28px; height: 28px; border-radius: 8px; color: var(--muted); }
    .conversation-action:hover { color: var(--text); background: var(--accent-muted); }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      background: var(--panel);
    }

    .topbar {
      padding: 22px 28px 18px;
      border-bottom: 1px solid var(--border);
    }

    .topbar-label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: -.03em;
    }

    .topbar p {
      max-width: 760px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .chat-area {
      overflow-y: auto;
      padding: 26px 28px;
      background: var(--panel);
    }

    .empty-state {
      min-height: 100%;
      display: grid;
      place-items: center;
    }

    .empty-card {
      width: min(620px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      text-align: left;
    }

    .empty-card h2 {
      margin: 0 0 10px;
      font-size: 26px;
      letter-spacing: -.03em;
    }

    .empty-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .quick-prompts {
      display: grid;
      gap: 8px;
      margin-top: 22px;
    }

    .quick-prompt {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-soft);
      text-align: left;
      font-size: 14px;
    }

    .quick-prompt:hover { border-color: var(--border-strong); background: var(--accent-muted); }

    .message-row { display: flex; margin: 0 0 16px; }
    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }

    .message {
      width: min(760px, 84%);
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      line-height: 1.7;
      overflow-wrap: anywhere;
      background: var(--panel-soft);
    }

    .message-row.user .message {
      color: var(--panel);
      background: var(--accent);
      border-color: var(--accent);
    }

    [data-theme="dark"] .message-row.user .message { color: #101010; }

    .message-row.assistant .message { background: var(--panel); }

    .message-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: inherit;
      font-size: 12px;
      font-weight: 700;
      opacity: .62;
    }

    .message-content p { margin: 0 0 10px; }
    .message-content p:last-child { margin-bottom: 0; }

    .message-content code {
      padding: 2px 5px;
      border-radius: 6px;
      color: var(--text);
      background: var(--accent-muted);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: .92em;
    }

    .stream-cursor {
      display: inline-block;
      width: 7px;
      height: 1em;
      margin-left: 2px;
      vertical-align: -.16em;
      border-radius: 4px;
      background: currentColor;
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .dots { display: inline-flex; gap: 3px; }
    .dots span { width: 4px; height: 4px; border-radius: 50%; background: currentColor; animation: pulse 1.1s infinite ease-in-out; }
    .dots span:nth-child(2) { animation-delay: .16s; }
    .dots span:nth-child(3) { animation-delay: .32s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: .35; } 40% { opacity: 1; } }

    .references {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .references-title {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .file-pills { display: flex; flex-wrap: wrap; gap: 6px; }

    .file-pill {
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      background: var(--panel-soft);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 11px;
    }

    .composer {
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    .composer-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel-soft);
    }

    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 130px;
      resize: vertical;
      outline: none;
      border: 0;
      color: var(--text);
      background: transparent;
      line-height: 1.6;
    }

    textarea::placeholder { color: var(--muted); }

    .send-button, .stop-button {
      min-width: 86px;
      height: 42px;
      padding: 0 16px;
      border-radius: 10px;
      font-weight: 700;
    }

    .send-button { color: var(--panel); background: var(--accent); }
    [data-theme="dark"] .send-button { color: #101010; }
    .stop-button { color: #fff; background: var(--danger); }
    .send-button:disabled { cursor: not-allowed; opacity: .42; }

    .composer-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 2px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 10;
      max-width: 360px;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      background: var(--panel);
      box-shadow: var(--shadow);
      transform: translateY(10px);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    .context-menu {
      position: fixed;
      z-index: 20;
      width: 150px;
      padding: 6px;
      display: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .context-menu button {
      width: 100%;
      padding: 9px 10px;
      border-radius: 9px;
      text-align: left;
    }

    .context-menu button:hover { background: var(--panel-soft); }
    .context-menu .danger { color: var(--danger); }

    @media (max-width: 820px) {
      .app-shell {
        width: 100vw;
        height: 100vh;
        min-height: 0;
        margin: 0;
        border: 0;
        border-radius: 0;
        grid-template-columns: 1fr;
      }
      .sidebar { display: none; }
      .topbar, .chat-area, .composer { padding-left: 18px; padding-right: 18px; }
      .message { width: 94%; }
      .composer-card { grid-template-columns: 1fr; }
      .send-button, .stop-button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="对话侧边栏">
      <div class="brand">
        <div class="brand-row">
          <div class="brand-title">AnswerAgent</div>
          <button class="theme-toggle" id="themeToggle" title="切换亮色 / 暗色主题" aria-label="切换主题">暗</button>
        </div>
        <div class="brand-subtitle">本地知识库问答原型。界面只保留对话、输入、参考文件与流式状态。</div>
      </div>
      <div class="sidebar-actions">
        <button class="new-chat" id="newChatBtn">新建对话</button>
      </div>
      <div class="sidebar-hint">双击标题重命名，右键打开菜单。</div>
      <div class="conversation-list" id="conversationList"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-label">当前对话</div>
        <h1 id="activeTitle">如何使用 newA 的接口</h1>
        <p id="activeMeta">模拟知识库匹配、文件选择和 SSE token 输出；来源只在回答底部以参考文件展示。</p>
      </header>

      <section class="chat-area" id="chatArea" aria-live="polite"></section>

      <footer class="composer">
        <div class="composer-card">
          <textarea id="questionInput" placeholder="输入问题，例如：如何使用 newA 的接口？" rows="2"></textarea>
          <button class="send-button" id="sendBtn">发送</button>
        </div>
        <div class="composer-footer">
          <span>本地模拟，不连接真实后端</span>
          <span id="streamState">空闲</span>
        </div>
      </footer>
    </main>
  </div>

  <div class="context-menu" id="contextMenu">
    <button id="contextRename">重命名</button>
    <button class="danger" id="contextDelete">删除对话</button>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const storageKey = 'answer-agent-prototype-state-minimal';
    const themeKey = 'answer-agent-prototype-theme';
    const sampleConversations = [
      {
        id: 'c-newa',
        title: '如何使用 newA 的接口',
        kb_names: ['newA'],
        updated_at: '刚刚',
        messages: [
          { role: 'user', content: '如何使用 newA 的接口？', timestamp: '10:00' },
          {
            role: 'assistant',
            content: '根据 newA 知识库中的 api.md，通常先初始化客户端，再调用对应业务方法。请求前请检查 .env 配置和模型提供商参数。',
            kb_names: ['newA'],
            files_used: ['newA/api.md', 'newA/src/client.py'],
            timestamp: '10:01'
          }
        ]
      },
      {
        id: 'c-vue',
        title: 'Vue3 前端状态设计',
        kb_names: ['frontend'],
        updated_at: '今天',
        messages: [
          { role: 'user', content: '前端 store 需要保存哪些字段？', timestamp: '09:42' },
          {
            role: 'assistant',
            content: '前端状态建议包含 conversations、activeConversationId、activeMessages、isStreaming、matchedKbs、selectedFiles 和 isDarkMode。',
            kb_names: ['frontend'],
            files_used: ['frontend/src/stores/chat.ts', 'frontend/src/types/index.ts'],
            timestamp: '09:43'
          }
        ]
      },
      {
        id: 'c-async',
        title: 'Python 异步流式输出',
        kb_names: ['backend'],
        updated_at: '昨天',
        messages: [
          { role: 'user', content: '为什么这里选择 SSE？', timestamp: '昨天' },
          {
            role: 'assistant',
            content: 'SSE 是服务器到浏览器的单向推送，适合 LLM token 流式输出，实现比 WebSocket 更轻。',
            kb_names: ['backend'],
            files_used: ['backend/app/api/chat.py', 'docs/设计方案.md'],
            timestamp: '昨天'
          }
        ]
      }
    ];

    const responses = {
      newA: '已匹配到 newA 知识库。根据 api.md 与 src/client.py，建议按三步使用接口：第一，在 .env 中配置 LLM_PROVIDER 与对应 API Key；第二，通过客户端初始化请求参数和对话 id；第三，调用 /api/chat/stream 接收 kb_matched、files_selected、token 和 done 事件。这样可以在前端实时展示答案，并在消息底部显示参考文件。',
      frontend: '前端原型对应 Vue3 设计可以拆成四块：ConversationSidebar 管理历史会话，ChatWindow 承载消息列表，InputBar 负责发送与停止，KbBadge 展示匹配知识库。实际工程中这些状态会进入 Pinia store，原型中则使用普通 JavaScript 对象模拟。',
      backend: '后端核心流程是：先由 kb_router 扫描知识库并判断匹配项，再由 file_loader 做关键词粗筛和文件读取，随后 chain_builder 将上下文、历史消息和当前问题注入问答链。接口通过 SSE 返回 token，因此前端可以边生成边渲染。',
      general: '当前问题没有明显命中特定知识库，因此进入通用回答模式。AnswerAgent 仍会保留最近几轮历史，结合当前问题直接调用 LLM。你也可以在问题中提到 newA、frontend、backend、接口、Vue3、SSE 等关键词来观察参考文件变化。'
    };

    let state = loadState();
    let activeId = state.activeId || state.conversations[0].id;
    let streamTimer = null;
    let streamAbort = false;
    let contextTargetId = null;

    const listEl = document.getElementById('conversationList');
    const chatEl = document.getElementById('chatArea');
    const titleEl = document.getElementById('activeTitle');
    const metaEl = document.getElementById('activeMeta');
    const inputEl = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const themeToggle = document.getElementById('themeToggle');
    const streamState = document.getElementById('streamState');
    const toastEl = document.getElementById('toast');
    const contextMenu = document.getElementById('contextMenu');

    initTheme();
    render();

    newChatBtn.addEventListener('click', createConversation);
    themeToggle.addEventListener('click', toggleTheme);
    sendBtn.addEventListener('click', () => state.isStreaming ? stopStreaming() : sendMessage());
    inputEl.addEventListener('input', updateControls);
    inputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        if (!state.isStreaming) sendMessage();
      }
    });

    document.getElementById('contextRename').addEventListener('click', () => {
      hideContextMenu();
      if (contextTargetId) renameConversation(contextTargetId);
    });

    document.getElementById('contextDelete').addEventListener('click', () => {
      hideContextMenu();
      if (contextTargetId) deleteConversation(contextTargetId);
    });

    document.addEventListener('click', hideContextMenu);

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed.conversations) && parsed.conversations.length) return parsed;
        }
      } catch (error) {
        console.warn('读取本地状态失败，使用示例数据。', error);
      }
      return { conversations: sampleConversations, activeId: sampleConversations[0].id, isStreaming: false, matchedKbs: [] };
    }

    function saveState() {
      const clean = { ...state, isStreaming: false, matchedKbs: [], activeId };
      localStorage.setItem(storageKey, JSON.stringify(clean));
    }

    function initTheme() {
      const theme = localStorage.getItem(themeKey) || 'light';
      document.documentElement.dataset.theme = theme;
      themeToggle.textContent = theme === 'dark' ? '亮' : '暗';
      themeToggle.title = theme === 'dark' ? '切换到亮色主题' : '切换到暗色主题';
    }

    function toggleTheme() {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem(themeKey, next);
      themeToggle.textContent = next === 'dark' ? '亮' : '暗';
      themeToggle.title = next === 'dark' ? '切换到亮色主题' : '切换到暗色主题';
      showToast(next === 'dark' ? '已切换为暗色主题' : '已切换为亮色主题');
    }

    function activeConversation() {
      return state.conversations.find(item => item.id === activeId) || state.conversations[0];
    }

    function render() {
      renderConversationList();
      renderChat();
      renderHeader();
      updateControls();
      saveState();
    }

    function renderConversationList() {
      listEl.innerHTML = '';
      state.conversations.forEach(conversation => {
        const item = document.createElement('div');
        item.className = 'conversation-item' + (conversation.id === activeId ? ' active' : '');
        item.addEventListener('click', () => selectConversation(conversation.id));
        item.addEventListener('contextmenu', event => {
          event.preventDefault();
          contextTargetId = conversation.id;
          contextMenu.style.display = 'block';
          contextMenu.style.left = event.clientX + 'px';
          contextMenu.style.top = event.clientY + 'px';
        });

        const main = document.createElement('div');
        main.className = 'conversation-main';
        const title = document.createElement('div');
        title.className = 'conversation-title';
        title.textContent = conversation.title;
        title.title = '双击重命名：' + conversation.title;
        title.addEventListener('dblclick', event => {
          event.stopPropagation();
          renameConversation(conversation.id);
        });
        const meta = document.createElement('div');
        meta.className = 'conversation-meta';
        meta.textContent = (conversation.kb_names && conversation.kb_names.length ? conversation.kb_names.join('、') : '通用回答') + ' · ' + conversation.updated_at;
        main.append(title, meta);

        const actions = document.createElement('div');
        actions.className = 'conversation-actions';
        const renameBtn = document.createElement('button');
        renameBtn.className = 'conversation-action';
        renameBtn.textContent = '改';
        renameBtn.title = '重命名';
        renameBtn.addEventListener('click', event => { event.stopPropagation(); renameConversation(conversation.id); });
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'conversation-action';
        deleteBtn.textContent = '删';
        deleteBtn.title = '删除';
        deleteBtn.addEventListener('click', event => { event.stopPropagation(); deleteConversation(conversation.id); });
        actions.append(renameBtn, deleteBtn);

        item.append(main, actions);
        listEl.appendChild(item);
      });
    }

    function renderHeader() {
      const conversation = activeConversation();
      titleEl.textContent = conversation.title;
      metaEl.textContent = state.isStreaming ? '正在模拟 SSE 流式输出，可点击停止按钮中断。' : '可发送问题、切换主题、重命名或删除当前对话。';
    }

    function renderChat() {
      const conversation = activeConversation();
      chatEl.innerHTML = '';
      if (!conversation.messages.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<div class="empty-card"><h2>开始提问</h2><p>发送问题后，原型会模拟知识库匹配、参考文件选择和逐字生成。顶部不展示知识库徽章，来源统一放在回答底部。</p><div class="quick-prompts"><button class="quick-prompt">如何使用 newA 的接口？</button><button class="quick-prompt">前端 store 如何设计？</button><button class="quick-prompt">为什么选择 SSE？</button></div></div>';
        empty.querySelectorAll('.quick-prompt').forEach(btn => {
          btn.addEventListener('click', () => {
            inputEl.value = btn.textContent;
            inputEl.focus();
            updateControls();
          });
        });
        chatEl.appendChild(empty);
        return;
      }
      conversation.messages.forEach(message => chatEl.appendChild(createMessageElement(message)));
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function createMessageElement(message) {
      const row = document.createElement('div');
      row.className = 'message-row ' + message.role;
      const bubble = document.createElement('article');
      bubble.className = 'message';
      const header = document.createElement('div');
      header.className = 'message-header';
      header.innerHTML = '<span>' + (message.role === 'user' ? '你' : 'AnswerAgent') + '</span><span>' + (message.timestamp || nowLabel()) + '</span>';
      const content = document.createElement('div');
      content.className = 'message-content';
      content.innerHTML = renderText(message.content || '') + (message.streaming ? '<span class="stream-cursor"></span>' : '');
      bubble.append(header, content);

      if (message.status) {
        const status = document.createElement('div');
        status.className = 'status-line';
        status.innerHTML = '<span class="dots"><span></span><span></span><span></span></span><span>' + message.status + '</span>';
        bubble.appendChild(status);
      }

      if (message.files_used && message.files_used.length) {
        bubble.appendChild(createReferences(message.files_used));
      }
      row.appendChild(bubble);
      return row;
    }

    function createReferences(files) {
      const box = document.createElement('div');
      box.className = 'references';
      const title = document.createElement('div');
      title.className = 'references-title';
      title.textContent = '参考文件';
      const pills = document.createElement('div');
      pills.className = 'file-pills';
      files.forEach(file => {
        const pill = document.createElement('span');
        pill.className = 'file-pill';
        pill.textContent = file;
        pills.appendChild(pill);
      });
      box.append(title, pills);
      return box;
    }

    function renderText(text) {
      return text
        .split('\n')
        .filter(Boolean)
        .map(line => '<p>' + escapeHtml(line).replace(/`([^`]+)`/g, '<code>$1</code>') + '</p>')
        .join('');
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
    }

    function updateControls() {
      sendBtn.textContent = state.isStreaming ? '停止' : '发送';
      sendBtn.className = state.isStreaming ? 'stop-button' : 'send-button';
      sendBtn.disabled = !state.isStreaming && !inputEl.value.trim();
      streamState.textContent = state.isStreaming ? '生成中' : '空闲';
    }

    function selectConversation(id) {
      if (state.isStreaming) {
        showToast('请先停止或等待当前回答完成。');
        return;
      }
      activeId = id;
      render();
    }

    function createConversation() {
      if (state.isStreaming) {
        showToast('生成中无法新建对话，请先停止。');
        return;
      }
      const id = 'c-' + Date.now();
      const conversation = { id, title: '新的对话', kb_names: [], updated_at: '刚刚', messages: [] };
      state.conversations.unshift(conversation);
      activeId = id;
      inputEl.value = '';
      render();
      showToast('已新建对话');
    }

    function renameConversation(id) {
      const conversation = state.conversations.find(item => item.id === id);
      if (!conversation) return;
      const title = prompt('请输入新的对话标题', conversation.title);
      if (!title || !title.trim()) return;
      conversation.title = title.trim();
      conversation.updated_at = '刚刚';
      render();
      showToast('对话已重命名');
    }

    function deleteConversation(id) {
      if (state.conversations.length === 1) {
        showToast('至少保留一个对话。');
        return;
      }
      const conversation = state.conversations.find(item => item.id === id);
      if (!conversation) return;
      if (!confirm('确认删除对话“' + conversation.title + '”？')) return;
      state.conversations = state.conversations.filter(item => item.id !== id);
      if (activeId === id) activeId = state.conversations[0].id;
      render();
      showToast('对话已删除');
    }

    function sendMessage() {
      const content = inputEl.value.trim();
      if (!content) return;
      const conversation = activeConversation();
      conversation.messages.push({ role: 'user', content, timestamp: nowLabel() });
      if (conversation.title === '新的对话') conversation.title = content.slice(0, 18) + (content.length > 18 ? '…' : '');
      conversation.updated_at = '刚刚';
      inputEl.value = '';
      state.isStreaming = true;
      state.matchedKbs = [];
      conversation.messages.push({ role: 'assistant', content: '', timestamp: nowLabel(), streaming: true, status: '正在匹配知识库...' });
      render();
      simulateSse(content, conversation);
    }

    function simulateSse(question, conversation) {
      const assistantMessage = conversation.messages[conversation.messages.length - 1];
      streamAbort = false;
      clearTimeout(streamTimer);
      streamTimer = setTimeout(() => {
        if (streamAbort) return;
        const match = matchKnowledge(question);
        state.matchedKbs = match.kbs;
        conversation.kb_names = match.kbs;
        assistantMessage.kb_names = match.kbs;
        assistantMessage.status = match.kbs.length ? '已匹配知识库：' + match.kbs.join('、') : '未匹配知识库，切换为通用回答';
        render();

        streamTimer = setTimeout(() => {
          if (streamAbort) return;
          assistantMessage.files_used = match.files;
          assistantMessage.status = match.files.length ? '已选择参考文件，开始生成回答...' : '开始生成通用回答...';
          render();
          streamTokens(assistantMessage, responses[match.responseKey]);
        }, 850);
      }, 800);
    }

    function matchKnowledge(question) {
      const text = question.toLowerCase();
      const kbs = [];
      const files = [];
      if (/newa|接口|api|client|客户端/.test(text)) {
        kbs.push('newA');
        files.push('newA/api.md', 'newA/src/client.py');
      }
      if (/vue|前端|store|pinia|主题|组件/.test(text)) {
        kbs.push('frontend');
        files.push('frontend/src/stores/chat.ts', 'frontend/src/components/ChatWindow.vue');
      }
      if (/后端|python|sse|fastapi|langchain|流式/.test(text)) {
        kbs.push('backend');
        files.push('backend/app/api/chat.py', 'backend/app/core/chain_builder.py');
      }
      if (kbs.includes('newA')) return { kbs, files, responseKey: 'newA' };
      if (kbs.includes('frontend')) return { kbs, files, responseKey: 'frontend' };
      if (kbs.includes('backend')) return { kbs, files, responseKey: 'backend' };
      return { kbs: [], files: [], responseKey: 'general' };
    }

    function streamTokens(message, fullText) {
      let index = 0;
      message.content = '';
      message.status = '';
      const tick = () => {
        if (streamAbort) return;
        message.content += fullText.slice(index, index + 2);
        index += 2;
        render();
        if (index < fullText.length) {
          streamTimer = setTimeout(tick, 42);
        } else {
          message.streaming = false;
          state.isStreaming = false;
          state.matchedKbs = [];
          activeConversation().updated_at = '刚刚';
          render();
          showToast('回答已完成，收到 done 事件。');
        }
      };
      tick();
    }

    function stopStreaming() {
      streamAbort = true;
      clearTimeout(streamTimer);
      const conversation = activeConversation();
      const message = conversation.messages[conversation.messages.length - 1];
      if (message && message.role === 'assistant' && message.streaming) {
        message.streaming = false;
        message.status = '';
        message.content = (message.content || '') + '\n（已停止生成）';
      }
      state.isStreaming = false;
      render();
      showToast('已停止生成，模拟 abort SSE 连接。');
    }

    function hideContextMenu() {
      contextMenu.style.display = 'none';
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    function nowLabel() {
      const now = new Date();
      return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }
  </script>
</body>
</html>
